name: Desktop Release CD

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NPM_INSTALL_FLAGS: '--prefer-offline --no-audit --fund=false'

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify source version matches stable tag
        run: npm run release:verify-version

      - name: Validate release branding
        run: npm run release:check

  build-mac:
    needs: release-preflight
    runs-on: macos-latest
    environment: release-prod
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update/macos-${{ matrix.arch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install Rosetta for x64 build on Apple Silicon runners
        if: matrix.arch == 'x64'
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ "$RUNNER_OS" = "Windows" ]; then
            NODE_DIR="$(node -p "require('path').dirname(process.execPath)")"
          else
            NODE_DIR="$(node -p "require('path').dirname(require('path').dirname(process.execPath))")"
          fi

          for attempt in 1 2 3; do
            if npm_config_nodedir="$NODE_DIR" NPM_CONFIG_NODEDIR="$NODE_DIR" npm ci ${{ env.NPM_INSTALL_FLAGS }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt, retrying in 15 seconds..."
            sleep 15
          done

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (macOS ${{ matrix.arch }})
        run: npm run electron:build:mac:${{ matrix.arch }}

      - name: Keep architecture-specific macOS update metadata
        run: cp release/latest-mac.yml release/latest-mac-${{ matrix.arch }}.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml
            release/latest-mac-${{ matrix.arch }}.yml

  build-win:
    needs: release-preflight
    runs-on: windows-2022
    environment: release-prod
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ "$RUNNER_OS" = "Windows" ]; then
            NODE_DIR="$(node -p "require('path').dirname(process.execPath)")"
          else
            NODE_DIR="$(node -p "require('path').dirname(require('path').dirname(process.execPath))")"
          fi

          for attempt in 1 2 3; do
            if npm_config_nodedir="$NODE_DIR" NPM_CONFIG_NODEDIR="$NODE_DIR" npm ci ${{ env.NPM_INSTALL_FLAGS }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt, retrying in 15 seconds..."
            sleep 15
          done

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (Windows)
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-linux:
    needs: release-preflight
    runs-on: ubuntu-latest
    environment: release-prod
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ "$RUNNER_OS" = "Windows" ]; then
            NODE_DIR="$(node -p "require('path').dirname(process.execPath)")"
          else
            NODE_DIR="$(node -p "require('path').dirname(require('path').dirname(process.execPath))")"
          fi

          for attempt in 1 2 3; do
            if npm_config_nodedir="$NODE_DIR" NPM_CONFIG_NODEDIR="$NODE_DIR" npm ci ${{ env.NPM_INSTALL_FLAGS }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt, retrying in 15 seconds..."
            sleep 15
          done

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libpixman-1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    environment: release-prod
    permissions:
      contents: write
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      TOS_SOURCE_BUCKET: github-hk
      TOS_SOURCE_REGION: cn-hongkong
      TOS_TARGET_BUCKET: github-release
      TOS_TARGET_REGION: cn-guangzhou
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release-x64
          path: release-mac/x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release-arm64
          path: release-mac/arm64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CatsCo ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-mac/x64/*.dmg
            release-mac/x64/*.dmg.blockmap
            release-mac/x64/latest-mac-x64.yml
            release-mac/arm64/*.dmg
            release-mac/arm64/*.dmg.blockmap
            release-mac/arm64/latest-mac-arm64.yml
            release-win/*
            release-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure AWS CLI is available
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual

      - name: Upload release payloads to Hong Kong source bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          SOURCE_ENDPOINT_URL="https://tos-s3-${TOS_SOURCE_REGION}.volces.com"
          IMMUTABLE_CACHE_CONTROL="public, max-age=31536000, immutable"
          replicated_keys=()

          upload_source_file() {
            local source_file="$1"
            local target_key="$2"

            aws s3 cp "$source_file" "s3://${TOS_SOURCE_BUCKET}/$target_key" \
              --endpoint-url "$SOURCE_ENDPOINT_URL" \
              --cache-control "$IMMUTABLE_CACHE_CONTROL" \
              --only-show-errors
          }

          target_key_for_file() {
            local source_file="$1"
            local name
            name="$(basename "$source_file")"

            case "$source_file" in
              release-mac/x64/*)
                printf 'update/macos-x64/%s\n' "$name"
                ;;
              release-mac/arm64/*)
                printf 'update/macos-arm64/%s\n' "$name"
                ;;
              *)
                printf 'update/%s\n' "$name"
                ;;
            esac
          }

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            case "$name" in
              latest*.yml)
                continue
                ;;
            esac

            target_key="$(target_key_for_file "$file")"
            upload_source_file "$file" "$target_key"
            replicated_keys+=("$target_key")
          done < <(find release-mac release-win release-linux -type f -print0)

          printf '%s\n' "${replicated_keys[@]}" > replicated-keys.txt

      - name: Wait for Guangzhou bucket replication
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"
          ATTEMPTS=36
          DELAY_SECONDS=10

          wait_for_target_object() {
            local key="$1"
            local attempt=1

            while [ "$attempt" -le "$ATTEMPTS" ]; do
              if aws s3api head-object \
                --bucket "$TOS_TARGET_BUCKET" \
                --key "$key" \
                --endpoint-url "$TARGET_ENDPOINT_URL" \
                >/dev/null 2>&1; then
                echo "Replicated: $key"
                return 0
              fi

              echo "Waiting for replicated object $key ($attempt/$ATTEMPTS)..."
              sleep "$DELAY_SECONDS"
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for replicated object: $key"
            return 1
          }

          while IFS= read -r key; do
            [ -n "$key" ] || continue
            wait_for_target_object "$key"
          done < replicated-keys.txt

      - name: Expose replicated payloads in Guangzhou bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"

          while IFS= read -r key; do
            [ -n "$key" ] || continue

            aws s3api put-object-acl \
              --bucket "$TOS_TARGET_BUCKET" \
              --key "$key" \
              --acl public-read \
              --endpoint-url "$TARGET_ENDPOINT_URL" \
              >/dev/null
          done < replicated-keys.txt


      - name: Publish latest metadata to Guangzhou bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"
          METADATA_CACHE_CONTROL="no-cache, no-store, must-revalidate, max-age=0"

          upload_metadata_file() {
            local source_file="$1"
            local target_key="$2"
            [ -f "$source_file" ] || return 0

            aws s3 cp "$source_file" "s3://${TOS_TARGET_BUCKET}/$target_key" \
              --endpoint-url "$TARGET_ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$METADATA_CACHE_CONTROL" \
              --only-show-errors
          }

          upload_metadata_file release-mac/x64/latest-mac.yml update/macos-x64/latest-mac.yml
          upload_metadata_file release-mac/arm64/latest-mac.yml update/macos-arm64/latest-mac.yml

          for file in release-win/latest*.yml release-linux/latest*.yml; do
            name="$(basename "$file")"
            upload_metadata_file "$file" "update/$name"
          done

      - name: Verify published update metadata
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          metadata_urls=(
            "${XIAOBA_UPDATE_BASE_URL}/latest.yml"
            "${XIAOBA_UPDATE_BASE_URL}/latest-linux.yml"
            "${XIAOBA_UPDATE_BASE_URL}/macos-x64/latest-mac.yml"
            "${XIAOBA_UPDATE_BASE_URL}/macos-arm64/latest-mac.yml"
          )

          for url in "${metadata_urls[@]}"; do
            status="$(curl -I -L -s -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" != "200" ]; then
              echo "Metadata check failed for $url (HTTP $status)"
              exit 1
            fi
          done
