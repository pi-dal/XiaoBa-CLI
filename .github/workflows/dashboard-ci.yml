name: Dashboard CI

on:
  pull_request:
    paths:
      - '.github/workflows/dashboard-ci.yml'
      - 'dashboard/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/build-dashboard.js'
      - 'scripts/inject-version.js'
      - 'scripts/verify-release-version.js'
      - 'tests/dashboard-*'
      - 'tsconfig.dashboard.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/dashboard-ci.yml'
      - 'dashboard/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/build-dashboard.js'
      - 'scripts/inject-version.js'
      - 'scripts/verify-release-version.js'
      - 'tests/dashboard-*'
      - 'tsconfig.dashboard.json'

concurrency:
  group: dashboard-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  NPM_INSTALL_FLAGS: '--prefer-offline --no-audit --fund=false'

jobs:
  dashboard:
    name: Build and test dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Build dashboard bundle
        run: npm run build:dashboard

      - name: Verify dashboard generated assets are current
        run: git diff --exit-code -- dashboard/build/dashboard-shell.js dashboard/index.html

      - name: Typecheck
        run: npm run build -- --pretty false

      - name: Typecheck dashboard React
        run: npm run typecheck:dashboard

      - name: Verify release dashboard version wiring
        run: node scripts/verify-release-version.js v$(node -p "require('./package.json').version")

      - name: Install Chromium for dashboard smoke test
        run: npx playwright install --with-deps chromium

      - name: Run dashboard tests
        run: npm run test:dashboard
